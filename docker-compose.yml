version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agora-v2-postgres
    environment:
      POSTGRES_DB: agora_v2
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora_v2_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agora-v2-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agora-v2-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agora:agora_v2_secret@postgres:5432/agora_v2
      REDIS_URL: redis://redis:6379/0
      OPENCLAW_GATEWAY_URL: ws://host.docker.internal:18789
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agora-v2-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
